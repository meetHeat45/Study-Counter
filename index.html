<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Subscribe Button */
.subscribe {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #ef4444;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: 0.2s;
}
.subscribe:hover {
    background: #dc2626;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 5px;
}

.channel {
    color: #94a3b8;
    margin-bottom: 30px;
    font-size: 1rem;
}

.puzzle {
    font-size: 3rem;
    font-weight: bold;
    margin: 30px 0;
    text-align: center;
    line-height: 1.6;
}

.comment {
    color: #facc15;
    font-size: 1rem;
    margin-top: 10px;
}

.footer {
    margin-top: 25px;
    color: #64748b;
    font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="subscribe">Subscribe</div>

<h1>Daily Math Puzzle</h1>
<div class="channel">PenBox</div>

<div class="puzzle" id="puzzle"></div>

<div class="comment">Comment your answer 👇</div>

<div class="footer">
    Think before you solve 🧠
</div>

<script>
const puzzles = [
    "I am a 2-digit number.<br>The sum of my digits is 9.<br>The difference between my digits is 3.<br><br>x = ?",

    "Find the missing number:<br>2, 6, 7, 21, 22, ?<br><br>x = ?",

    "I am a number.<br>If you reverse me, I become 27 more than myself.<br><br>x = ?",

    "Find the missing number:<br>3, 9, 27, ?, 243<br><br>x = ?",

    "I am a number.<br>When divided by 2, 3, and 4, I leave remainder 1 each time.<br><br>x = ?",

    "Find the missing number:<br>1, 4, 9, 16, ?, 36<br><br>x = ?",

    "I am a number.<br>My square ends with 6, and I am less than 10.<br><br>x = ?",

    "Find the missing number:<br>5, 11, 23, 47, ?<br><br>x = ?",

    "I am a number.<br>If you add me to my reverse, you get 121.<br><br>x = ?",

    "Find the missing number:<br>2, 3, 5, 9, 17, ?<br><br>x = ?"
];

let index = 0;

function changePuzzle() {
    document.getElementById("puzzle").innerHTML = puzzles[index];

    index++;

    // Loop back after last puzzle
    if (index >= puzzles.length) {
        index = 0;
    }
}

// Load first puzzle
changePuzzle();

// Auto change every 10 minutes
setInterval(changePuzzle, 600000);
</script>

</body>
</html>
