<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

.channel {
    color: #94a3b8;
    margin-bottom: 40px;
}

.puzzle {
    font-size: 3rem;
    font-weight: bold;
    margin: 20px 0;
}

.footer {
    margin-top: 30px;
    color: #64748b;
    font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>Daily Math Puzzle</h1>
    <div class="channel">Synapse Med</div>

    <div class="puzzle" id="puzzle">
        x + 12/x = 7 <br><br>
        x = ?
    </div>

    <div class="footer">
        Think before you solve 🧠
    </div>
</div>

<script>
// You can change puzzle here easily
const puzzles = [
    "x + 12/x = 7 <br><br> x = ?",
    "x + 7/x = 6 <br><br> x = ?",
    "x + 20/x = 9 <br><br> x = ?",
    "x² + 1/x² = 10 <br><br> x = ?"
];

// Change puzzle every refresh
let randomPuzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
document.getElementById("puzzle").innerHTML = randomPuzzle;
</script>

</body>
</html>
