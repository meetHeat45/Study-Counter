<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    color: white;
    overflow: hidden;
    background: radial-gradient(circle at top, #0f172a, #020617 70%);
}

.container {
    text-align: center;
    padding: 20px;
}

h1 { font-size: 2.2rem; }

.channel { color: #94a3b8; margin-bottom: 10px; }

.hook { color: #f87171; margin-bottom: 10px; }

.category { color: #22c55e; margin-bottom: 10px; }

.puzzle {
    font-size: 2rem;
    line-height: 1.6;
}

/* TIMER */
.timer {
    margin-top: 15px;
    font-size: 1.3rem;
    animation: pulse 1.5s infinite;
}

.bar {
    width: 260px;
    height: 6px;
    background: #1f2937;
    border-radius: 10px;
    margin: auto;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 100%;
    background: #22c55e;
    transition: width 1s linear;
}

/* Pulse animation */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* Danger shake */
.danger {
    color: red !important;
    animation: shake 0.3s infinite;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    50% { transform: translateX(2px); }
    75% { transform: translateX(-2px); }
    100% { transform: translateX(0); }
}

/* Score */
.score {
    margin-top: 10px;
    color: #facc15;
}

/* CHAT */
.chat {
    position: absolute;
    bottom: 20px;
    left: 10px;
    width: 75%;
    font-size: 0.85rem;
}

.msg {
    margin-top: 6px;
    animation: fadeUp 5s linear forwards;
}

.name {
    color: #38bdf8;
    font-weight: bold;
    margin-right: 5px;
}

@keyframes fadeUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-60px); }
}

/* REACTIONS */
.reactions {
    position: absolute;
    bottom: 20px;
    left: 5px;
}

.react {
    position: absolute;
    font-size: 1.2rem;
    animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-100px); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Daily Math Puzzle</h1>
    <div class="channel">📘 PenBox</div>
    <div class="hook">🔥 Only 1% can solve this!</div>

    <div class="category" id="category"></div>
    <div class="puzzle" id="puzzle"></div>

    <div class="timer" id="timerText">
        ⏳ <span id="time">60</span>s
        <div class="bar"><div class="progress" id="progress"></div></div>
    </div>

    <div class="score">Score: <span id="score">0</span></div>
</div>

<div class="chat" id="chat"></div>
<div class="reactions" id="reactions"></div>

<script>
const puzzles = [
{type:"AGE", text:"A father is 4 times as old as his son.<br>After 10 years, twice as old.<br>Find ages."},
{type:"SPEED", text:"Two trains 300 km apart.<br>60 km/h & 90 km/h.<br>When meet?"},
{type:"PROFIT", text:"Marked 50% above CP.<br>Discounts 20% & 10%.<br>Profit?"},
{type:"MIXTURE", text:"40 L milk, replaced twice.<br>Milk left?"}
];

let timeLeft = 60;
let timer;
let score = 0;

/* TIMER */
function startTimer() {
    clearInterval(timer);
    timeLeft = 60;

    const timerText = document.getElementById("timerText");

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        let percent = (timeLeft / 60) * 100;
        let bar = document.getElementById("progress");

        bar.style.width = percent + "%";

        /* Color change */
        if (timeLeft > 30) bar.style.background = "#22c55e";
        else if (timeLeft > 10) bar.style.background = "#facc15";
        else bar.style.background = "red";

        /* Danger mode */
        if (timeLeft <= 10) {
            timerText.classList.add("danger");
        } else {
            timerText.classList.remove("danger");
        }

        if (timeLeft <= 0) {
            score++;
            document.getElementById("score").innerText = score;
            loadPuzzle();
        }
    }, 1000);
}

/* Puzzle */
function loadPuzzle() {
    const p = puzzles[Math.floor(Math.random() * puzzles.length)];
    document.getElementById("category").innerText = p.type;
    document.getElementById("puzzle").innerHTML = p.text;
    startTimer();
}

/* CHAT */
const names = ["rahul","neha","ankit","preeti","vicky","simran","amit","rohit","kajal"];
const messages = [
"bhai easy hai 😎",
"yeh kya tha 😭",
"got it!",
"wait samajh nahi aaya",
"answer 40 hai kya?",
"arey yeh tricky hai",
"mil gaya finally 💯",
"last second pe solve kiya",
"kya logic hai iska",
"overthinking kar raha tha 😵",
"ohhh samajh aaya 🥳"
];

function spawnMessage() {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg";

    const name = names[Math.floor(Math.random() * names.length)];
    const msg = messages[Math.floor(Math.random() * messages.length)];

    div.innerHTML = `<span class="name">${name}</span>${msg}`;

    chat.appendChild(div);
    setTimeout(() => div.remove(), 5000);
}

/* REACTIONS */
const emojis = ["❤️","😭","💯","🥳"];

function spawnReaction() {
    const container = document.getElementById("reactions");

    const div = document.createElement("div");
    div.className = "react";
    div.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    div.style.left = Math.random() * 60 + "px";

    container.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

/* Intervals */
setInterval(spawnMessage, Math.random() * 1500 + 800);
setInterval(spawnReaction, 800);

/* Init */
loadPuzzle();
</script>

</body>
</html>
