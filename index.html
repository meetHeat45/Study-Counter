<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Subscribe */
.subscribe {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #ef4444;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
}

h1 { font-size: 2.2rem; }

.hook { color: #f87171; margin-bottom: 10px; }

.category { color: #22c55e; margin-bottom: 10px; }

.puzzle {
    font-size: 2rem;
    text-align: center;
    max-width: 500px;
}

/* Timer */
.timer { margin-top: 10px; }

.bar {
    width: 300px;
    height: 8px;
    background: #1f2937;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 5px;
}

.progress {
    height: 100%;
    width: 100%;
    background: #22c55e;
    transition: width 1s linear;
}

/* Buttons */
.btn {
    margin-top: 10px;
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.reveal { background: #3b82f6; }
.next { background: #22c55e; }

/* Answer */
.answer {
    margin-top: 10px;
    color: #38bdf8;
    display: none;
}

/* Score */
.score {
    margin-top: 10px;
    color: #facc15;
}

/* Fake comments */
.comments {
    margin-top: 20px;
    font-size: 0.85rem;
    color: #9ca3af;
}
</style>
</head>

<body>

<div class="subscribe">Subscribe</div>

<h1>Daily Math Puzzle</h1>
<div class="hook">🔥 Only 1% can solve this!</div>

<div class="category" id="category"></div>
<div class="puzzle" id="puzzle"></div>

<div class="timer">
⏳ <span id="time">60</span>s
<div class="bar"><div class="progress" id="progress"></div></div>
</div>

<button class="btn reveal" onclick="revealAnswer()">Show Answer</button>
<button class="btn next" onclick="nextPuzzle()">Next</button>

<div class="answer" id="answer"></div>
<div class="score">Score: <span id="score">0</span></div>

<div class="comments" id="comments"></div>

<script>
const puzzles = [
{
type:"AGE",
text:"A father is 4 times as old as his son.<br>After 10 years, twice as old.<br>Find ages.",
answer:"40 & 10"
},
{
type:"SPEED",
text:"Two trains 300 km apart.<br>60 km/h & 90 km/h.<br>When meet?",
answer:"2 hours"
},
{
type:"PROFIT",
text:"Marked 50% above CP.<br>Discounts 20% & 10%.<br>Profit?",
answer:"8% profit"
},
{
type:"MIXTURE",
text:"40 L milk, replaced twice.<br>Milk left?",
answer:"22.5 L"
}
];

let timer;
let timeLeft = 60;
let score = 0;

const fakeComments = [
"Bro this is easy 😎",
"Got it in 5 sec",
"Wait what??",
"This is tricky 😳",
"Answer is 40??",
"Only geniuses can solve 🔥"
];

function startTimer() {
    clearInterval(timer);
    timeLeft = 60;

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        let percent = (timeLeft / 60) * 100;
        document.getElementById("progress").style.width = percent + "%";

        // Tick sound last 10 sec
        if (timeLeft <= 10) {
            playBeep();
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            nextPuzzle();
        }
    }, 1000);
}

function playBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(() => osc.stop(), 100);
}

function loadPuzzle() {
    const p = puzzles[Math.floor(Math.random() * puzzles.length)];

    document.getElementById("category").innerText = p.type;
    document.getElementById("puzzle").innerHTML = p.text;
    document.getElementById("answer").innerText = "Answer: " + p.answer;
    document.getElementById("answer").style.display = "none";

    startTimer();
    generateComments();
}

function revealAnswer() {
    document.getElementById("answer").style.display = "block";
    score++;
    document.getElementById("score").innerText = score;
}

function nextPuzzle() {
    loadPuzzle();
}

function generateComments() {
    let comments = "";
    for (let i = 0; i < 3; i++) {
        comments += fakeComments[Math.floor(Math.random() * fakeComments.length)] + "<br>";
    }
    document.getElementById("comments").innerHTML = comments;
}

loadPuzzle();
</script>

</body>
</html>
