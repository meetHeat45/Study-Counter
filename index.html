<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    text-align: center;
    max-width: 500px;
}

/* Subscribe */
.subscribe {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #ef4444;
    padding: 8px 14px;
    border-radius: 8px;
}

/* Heading */
h1 { font-size: 2rem; }

.channel {
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 15px;
}

.hook { color: #f87171; margin-bottom: 10px; }

.category { color: #22c55e; margin-bottom: 10px; }

.puzzle {
    font-size: 1.8rem;
    line-height: 1.6;
}

/* Timer */
.timer { margin-top: 10px; }

.bar {
    width: 260px;
    height: 8px;
    background: #1f2937;
    border-radius: 10px;
    overflow: hidden;
    margin: auto;
}

.progress {
    height: 100%;
    width: 100%;
    background: #22c55e;
}

/* Score */
.score {
    margin-top: 10px;
    color: #facc15;
}

/* Live comments */
.live-comments {
    position: absolute;
    bottom: 20px;
    left: 10px;
    width: 70%;
}

.comment {
    background: rgba(255,255,255,0.08);
    padding: 6px 10px;
    border-radius: 12px;
    margin-top: 6px;
    font-size: 0.8rem;
    animation: floatUp 5s linear forwards;
    backdrop-filter: blur(5px);
}

.username {
    font-weight: bold;
    color: #38bdf8;
    margin-right: 5px;
}

.likes {
    color: #f87171;
    font-size: 0.7rem;
    margin-left: 6px;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-80px); opacity: 0; }
}
</style>
</head>

<body>

<div class="subscribe">Subscribe</div>

<div class="container">
    <h1>Daily Math Puzzle</h1>
    <div class="channel">📘 PenBox</div>
    <div class="hook">🔥 Only 1% can solve this!</div>

    <div class="category" id="category"></div>
    <div class="puzzle" id="puzzle"></div>

    <div class="timer">
        ⏳ <span id="time">60</span>s
        <div class="bar"><div class="progress" id="progress"></div></div>
    </div>

    <div class="score">Score: <span id="score">0</span></div>
</div>

<div class="live-comments" id="liveComments"></div>

<script>
const puzzles = [
{
type:"AGE",
text:"A father is 4 times as old as his son.<br>After 10 years, twice as old.<br>Find ages."
},
{
type:"SPEED",
text:"Two trains 300 km apart.<br>60 km/h & 90 km/h.<br>When meet?"
},
{
type:"PROFIT",
text:"Marked 50% above CP.<br>Discounts 20% & 10%.<br>Profit?"
},
{
type:"MIXTURE",
text:"40 L milk, replaced twice.<br>Milk left?"
}
];

let timer;
let timeLeft = 60;
let score = 0;

/* Timer */
function startTimer() {
    clearInterval(timer);
    timeLeft = 60;

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        let percent = (timeLeft / 60) * 100;
        document.getElementById("progress").style.width = percent + "%";

        if (timeLeft <= 10) playBeep();

        if (timeLeft <= 0) {
            clearInterval(timer);
            score++;
            document.getElementById("score").innerText = score;
            nextPuzzle();
        }
    }, 1000);
}

/* Sound */
function playBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(() => osc.stop(), 80);
}

/* Puzzle */
function loadPuzzle() {
    const p = puzzles[Math.floor(Math.random() * puzzles.length)];

    document.getElementById("category").innerText = p.type;
    document.getElementById("puzzle").innerHTML = p.text;

    startTimer();
}

function nextPuzzle() {
    loadPuzzle();
}

/* Realistic comments */
const names = [
"rahul_07","neha.medico","studyking","math_guy",
"randomuser123","ash_yt","preeti_x","ankit_99"
];

const messages = [
"Got it 😎",
"Wait what??",
"This is tricky",
"I think answer is 40",
"No way bro",
"Easy one",
"Confusing 😭",
"Is it 2 hours?",
"Milk = 22.5?",
"Almost solved",
"Bro I got it last second",
"Why is this so hard 😭",
"Am I overthinking this?"
];

function spawnComment() {
    const container = document.getElementById("liveComments");

    const div = document.createElement("div");
    div.className = "comment";

    const name = names[Math.floor(Math.random() * names.length)];
    const msg = messages[Math.floor(Math.random() * messages.length)];
    const likes = Math.floor(Math.random() * 50);

    div.innerHTML = `<span class="username">${name}</span>${msg} <span class="likes">❤️ ${likes}</span>`;

    container.appendChild(div);

    setTimeout(() => div.remove(), 5000);
}

/* Random interval comments */
setInterval(() => {
    spawnComment();
}, Math.random() * 1500 + 800);

/* Init */
loadPuzzle();
</script>

</body>
</html>
