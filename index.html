<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:transparent;
font-family:Arial, sans-serif;
color:white;
margin:0;
}

.container{
padding:35px;
border:2px solid rgba(255,255,255,0.2);
border-radius:18px;
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.4);
width:420px;
}

#title{
font-size:38px;
font-weight:bold;
letter-spacing:3px;
margin-bottom:10px;
text-shadow:0 0 12px white;
}

#date{
font-size:22px;
margin-bottom:25px;
opacity:0.85;
}

.task{
font-size:26px;
margin:15px 0;
padding-left:15px;
border-left:4px solid white;
}

</style>
</head>

<body>

<div class="container">

<div id="title">📚 CURRENT STUDY</div>

<div id="date"></div>

<div class="task">Bailey & Love – Thyroid</div>
<div class="task">Bailey & Love – Hernia</div>
<div class="task">Surgery MCQs</div>

</div>

<script>

function updateDate(){

const now = new Date();

const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };

document.getElementById("date").innerHTML =
now.toLocaleDateString(undefined, options);

}

updateDate();

</script>

</body>
</html>
