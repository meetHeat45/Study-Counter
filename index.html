<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PenBox - Daily Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
    color: #38bdf8;
    letter-spacing: 1px;
}

.container {
    margin-top: 80px;
}

.puzzle {
    font-size: 48px;
    margin: 40px;
    font-weight: bold;
}

.subtitle {
    color: #94a3b8;
    font-size: 18px;
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    background: #38bdf8;
    color: black;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

/* Hidden Answer (you control) */
.answer {
    display: none;
    margin-top: 20px;
    font-size: 24px;
    color: #22c55e;
}

/* Live stream */
.stream {
    margin-top: 60px;
}
</style>
</head>

<body>

<h1>🧠 Daily Math Puzzle</h1>
<p class="subtitle">Solve it before the next one drops 👀</p>

<div class="container">

    <!-- 🔥 CHANGE THIS DAILY -->
    <div class="puzzle">
        x + 7/x = 6
    </div>

    <!-- OPTIONAL (KEEP HIDDEN OR DELETE) -->
    <div class="answer" id="answer">
        Answer revealed later 🔒
    </div>

</div>

<script>
// Only you can reveal answer by editing code (not users)
function revealAnswer() {
    document.getElementById("answer").style.display = "block";
}
</script>

</body>
</html>
